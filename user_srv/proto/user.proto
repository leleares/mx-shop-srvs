syntax = "proto3";

option go_package = ".;proto";

service User {
    rpc GetUserList(PageInfo) returns (UserListResponse);
}

message PageInfo {
    uint32 pn = 1;
    uint32 pSize = 2;
}

message UserInfoResponse {
    int32 id = 1;
    string password = 2;
    string mobile = 3;
    string nickName = 4;
    uint64 birthDay = 5;
    string gender = 6;
    int32 role = 7;
}

message UserListResponse {
    uint32 total = 1;
    repeated UserInfoResponse data = 2;
}

